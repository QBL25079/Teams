services:
  teams-postgres:
    image: postgres:16-alpine
    container_name: teams-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./out/pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  teams-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./migrations:/migrations
    depends_on:
      teams-postgres:
        condition: service_healthy
    restart: "no"

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: teams-port-forwarder
    command: TCP-LISTEN:5432,fork,reuseaddr TCP:teams-postgres:5432
    ports:
      - "127.0.0.1:5433:5432"
    depends_on:
      - teams-postgres
    restart: "no"